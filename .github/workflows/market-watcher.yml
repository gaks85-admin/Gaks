name: Market Watcher Cron

on:
  schedule:
    - cron: '*/15 * * * *' # Run every 15 minutes (Balanced Standard)
  workflow_dispatch: # Allow manual triggering

jobs:
  run-market-watcher:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Market Watcher Serverless API
        run: |
          curl -X POST https://gaks-ai.vercel.app/api/cron/market-watcher \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail
