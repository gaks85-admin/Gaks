name: Market Watcher Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-market-watcher:
    runs-on: ubuntu-latest
    steps:
      - name: Print Cron Started
        run: echo "Cron started"

      - name: Call Market Watcher API
        run: |
          RESPONSE_CODE=$(curl -s -o response_body.json -w "%{http_code}" -X POST https://gaks-ai.vercel.app/api/cron/market-watcher \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "HTTP Status Code: $RESPONSE_CODE"
          echo "Response Body:"
          cat response_body.json
          if [ "$RESPONSE_CODE" -ne 200 ]; then
            echo "Error: Received HTTP $RESPONSE_CODE from Market Watcher API"
            exit 1
          fi
